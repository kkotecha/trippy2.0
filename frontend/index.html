<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Plan your perfect trip with AI-powered recommendations">
    <title>AI Trip Planner - Smart Travel Planning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body class="bg-gradient-to-br from-gray-50 to-blue-50 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <header class="text-center mb-12">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-3 bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                🌍 AI Trip Planner
            </h1>
            <p class="text-xl text-gray-600">Plan your perfect trip with intelligent, personalized recommendations</p>
        </header>

        <div class="bg-white rounded-2xl shadow-xl p-8 md:p-12">
            <!-- Input Form -->
            <div id="formSection" class="max-w-2xl mx-auto">
                <form id="tripForm" class="space-y-6">
                    <div>
                        <label for="destination" class="block text-sm font-semibold text-gray-700 mb-2">Destination</label>
                        <input type="text" id="destination" name="destination" placeholder="e.g., Paris, Tokyo, New York" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    </div>

                    <div>
                        <label for="interests" class="block text-sm font-semibold text-gray-700 mb-2">Interests (comma-separated)</label>
                        <input type="text" id="interests" name="interests" placeholder="e.g., museums, food, adventure, nightlife" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    </div>

                    <div>
                        <label for="duration" class="block text-sm font-semibold text-gray-700 mb-2">Trip Duration (days)</label>
                        <input type="number" id="duration" name="duration" min="1" max="30" value="3" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    </div>

                    <div>
                        <label for="budget" class="block text-sm font-semibold text-gray-700 mb-2">Budget Level</label>
                        <select id="budget" name="budget" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                            <option value="budget">Budget</option>
                            <option value="moderate" selected>Moderate</option>
                            <option value="luxury">Luxury</option>
                        </select>
                    </div>

                    <button type="submit" id="submitBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md hover:shadow-lg transition transform hover:-translate-y-0.5">
                        Plan My Trip
                    </button>
                </form>
            </div>

            <!-- Loading State -->
            <div id="loading" class="text-center py-16" style="display: none;">
                <div class="spinner"></div>
                <p class="text-lg text-gray-600 font-medium">Planning your perfect trip... This may take a moment.</p>
            </div>

            <!-- Results Section -->
            <div id="resultsSection" class="fade-in" style="display: none;">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 pb-6 border-b-2 border-gray-100">
                    <h2 id="resultsTitle" class="text-3xl font-bold text-gray-900"></h2>
                    <button id="newTripBtn" class="px-6 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-lg transition">
                        Plan Another Trip
                    </button>
                </div>

                <div class="flex gap-2 mb-8 border-b-2 border-gray-200 overflow-x-auto">
                    <button class="tab-btn px-6 py-3 font-semibold text-gray-500 hover:text-blue-600 hover:bg-blue-50 border-b-2 border-transparent transition whitespace-nowrap" data-tab="itinerary">
                        Itinerary
                    </button>
                    <button class="tab-btn px-6 py-3 font-semibold text-gray-500 hover:text-blue-600 hover:bg-blue-50 border-b-2 border-transparent transition whitespace-nowrap" data-tab="weather">
                        Weather & Tips
                    </button>
                    <button class="tab-btn px-6 py-3 font-semibold text-gray-500 hover:text-blue-600 hover:bg-blue-50 border-b-2 border-transparent transition whitespace-nowrap" data-tab="local">
                        Local Insights
                    </button>
                </div>

                <div class="tab-content">
                    <div id="itinerary" class="tab-panel">
                        <div id="itineraryContent" class="space-y-6"></div>
                    </div>

                    <div id="weather" class="tab-panel">
                        <div id="weatherContent" class="prose max-w-none"></div>
                    </div>

                    <div id="local" class="tab-panel">
                        <div id="localContent" class="prose max-w-none"></div>
                    </div>
                </div>
            </div>

            <!-- Error Section -->
            <div id="errorSection" class="text-center py-16" style="display: none;">
                <div class="max-w-md mx-auto p-8 bg-red-50 border border-red-200 rounded-xl">
                    <h3 class="text-2xl font-bold text-red-600 mb-4">Oops! Something went wrong</h3>
                    <p id="errorMessage" class="text-gray-600 mb-6"></p>
                    <button id="retryBtn" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition">
                        Try Again
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
